# MoAI Pipeline Rules
#
# Rules that control pipeline behavior: query parsing, planning, and chunk selection.

# ── Query Parsing ──

# Words that trigger clause splitting on " and "
[CLAUSE_SPLIT_TRIGGERS]
where, what, why, how, when, who, also, tell

# Scope inference from query wording
[SCOPE_STRICT_HINTS]
brief, short, quick, just

[SCOPE_EXPANDED_HINTS]
in detail, explain, overview, describe, comprehensive, thorough

# Form detection from query wording
[FORM_EXPLANATION_HINTS]
explain, describe, how, why

[FORM_SUMMARY_HINTS]
overview, tell me about, summarize

# ── Self-Ask Expansion Rules ──
# Format: TRIGGER -> SUB_PROPERTY : FORM : keyword1, keyword2, ...

[SELF_ASK]
ADVANTAGES  -> DEFINITION : SHORT_FACT : definition
ADVANTAGES  -> LOCATION   : SHORT_FACT : located, region
COMPARISON  -> DEFINITION : SHORT_FACT : definition
LIMITATIONS -> USAGE       : EXPLANATION : used for, application
HISTORY     -> TIME        : SHORT_FACT : year, century
HISTORY     -> DEFINITION : SHORT_FACT : definition
FUNCTION    -> DEFINITION : SHORT_FACT : definition

# ── Question Planner Dependencies ──
# Format: PROPERTY -> DEPENDS_ON (B must be answered before A)

[DEPENDENCIES]
HISTORY     -> LOCATION
ADVANTAGES  -> LOCATION
ADVANTAGES  -> DEFINITION
FUNCTION    -> DEFINITION
LIMITATIONS -> DEFINITION
COMPARISON  -> DEFINITION
USAGE       -> DEFINITION

# ── Preferred Chunk Types per Property ──
# Format: PROPERTY -> CHUNK_TYPE1, CHUNK_TYPE2, ...
# First type is primary (highest boost). Used by synthesizer and chunk selector.

[PREFERRED_CHUNKS]
LOCATION    -> LOCATION, GENERAL
DEFINITION  -> DEFINITION, LOCATION, GENERAL
TIME        -> TEMPORAL, HISTORY
HISTORY     -> HISTORY, TEMPORAL
FUNCTION    -> FUNCTION, PROCEDURE, DEFINITION
COMPOSITION -> DEFINITION, GENERAL
USAGE       -> USAGE, PROCEDURE, GENERAL
ADVANTAGES  -> ADVANTAGES, GENERAL
LIMITATIONS -> LIMITATIONS, GENERAL
COMPARISON  -> ADVANTAGES, LIMITATIONS, GENERAL
