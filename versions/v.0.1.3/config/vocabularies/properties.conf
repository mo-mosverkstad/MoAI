# MoAI Property Vocabularies
#
# All word lists organized by Property. Each property has multiple roles:
#   CHUNK_*    — chunk classification (which paragraphs match this property)
#   QUERY_*    — query analysis (which queries ask about this property)
#   VALIDATE_* — answer validation (which words confirm the answer is correct)
#   SYNTH_*    — answer synthesis (scoring words for answer extraction)
#
# To improve a property, edit its section below. All pipeline stages pick it up.

# ── Chunk Classification Order ──
# First match wins when classifying paragraphs.
[CHUNK_TYPES]
LOCATION, ADVANTAGES, LIMITATIONS, USAGE, FUNCTION, DEFINITION, PERSON, TEMPORAL, PROCEDURE, HISTORY

# ══════════════════════════════════════
# LOCATION
# ══════════════════════════════════════

[CHUNK_LOCATION]
located, coast, archipelago, built across, connected to, situated
eastern, western, southern, northern, island nation, port city

# "capital" triggers LOCATION only when paired with one of these context words
[CHUNK_LOCATION_CAPITAL_CONTEXT]
capital

[CHUNK_LOCATION_CAPITAL_REQUIRES]
island, city, region, country, bridge, port, sea, lake, coast, located

[QUERY_LOCATION]
locat, where, capital, coast, close to, near
geograph, region, city, country, continent, border

[VALIDATE_LOCATION]
located, capital, coast, city, region
sea, island, eastern, western, southern
northern, situated, built

[SYNTH_LOC_WORDS]
located, coast, eastern, western, southern, northern
situated, built across, latitude, longitude

[SYNTH_LOC_NOUNS]
sea, ocean, lake, river, island, peninsula
region, border, strait

[SYNTH_LOC_COMPARE]
located, coast, eastern, situated, sea, lake, island

[SYNTH_LOC_PENALTIES]
important, nobel, museum, cultural, startup
tech hub, green area, nature park, ferry, airport

