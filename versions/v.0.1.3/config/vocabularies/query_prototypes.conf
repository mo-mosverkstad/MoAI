# Query Analyzer Property Prototypes and Word Lists
# Property -> signal words for semantic prototype scoring.
# Weight per property is configured in default.conf (not here).

# ── Clause Splitting ──
# Words that trigger splitting on " and " when they follow it
[CLAUSE_SPLIT_TRIGGERS]
where, what, why, how, when, who, also, tell

# ── Scope Inference ──
[SCOPE_STRICT_HINTS]
brief, short, quick, just

[SCOPE_EXPANDED_HINTS]
in detail, explain, overview, describe, comprehensive, thorough

# ── Form Detection ──
[FORM_EXPLANATION_HINTS]
explain, describe, how, why

[FORM_SUMMARY_HINTS]
overview, tell me about, summarize

# ── Property Prototypes ──

[LOCATION]
locat, where, capital, coast, close to, near
geograph, region, city, country, continent, border

[ADVANTAGES]
advantage, benefit, strength, pro
why is, important, significant, popular, widely

[LIMITATIONS]
limitation, drawback, disadvantage, weakness, con
challenge, problem, issue, risk, costly

[FUNCTION]
how does, how do, mechanism, ensures, works
process, protocol, function, method, operates

[USAGE]
used for, use case, beginner, start with
recommend, suitable, learning, best for, application

[HISTORY]
history, origin, founded, century, heritage
evolved, developed, introduced, ancient, medieval

[TIME]
when, year, date, century, invented
introduced, created, period, era

[COMPARISON]
vs, versus, compare, difference, better
worse, than, between, relative

[DEFINITION]
what is, what are, define, definition
meaning, concept, overview, explain

[COMPOSITION]
composed, consist, made of, component
type, kind, part, element, structure
