# Synthesizer Vocabulary
# Word lists used for scoring in answer synthesis.

# ── Definition Synthesizer ──

[DEF_FIRST_PASS_PATTERNS]
is a , is an , is the , capital, known for, refers to, defined as

[DEF_FIRST_PASS_PENALTIES]
expensive, rent , cost, salary, startup
tech hub, ranking, ranks, ecosystem
important for, important because

[DEF_FALLBACK_PATTERNS]
is a , is an , is the , refers to
defined as, known for, known as
collection of, organized

[DEF_FALLBACK_PENALTIES]
expensive, rent , cost, salary
startup, tech hub, ranking, ranks

# ── Location Synthesizer ──

[LOC_CHUNK_COMPARE_WORDS]
located, coast, eastern, situated, sea, lake, island

[LOC_WORDS]
located, coast, eastern, western, southern, northern
situated, built across, latitude, longitude

[LOC_NOUNS]
sea, ocean, lake, river, island, peninsula
region, border, strait

[LOC_NON_LOC_PENALTIES]
important, nobel, museum, cultural, startup
tech hub, green area, nature park, ferry, airport

