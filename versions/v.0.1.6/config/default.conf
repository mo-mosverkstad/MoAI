# MoAI v.0.1.5 Configuration
# All tunable parameters in one place. Reload by restarting the process.
# Lines starting with # are comments. Format: key = value

# ── Profiling ──
profiling.enabled = false
profiling.output_file = ../profiling.jsonl

# ── Query Analyzer ──
query.analyzer = rule         # rule | neural | auto

# Property prototype weights (for query → property scoring)
query.weight.LOCATION = 3.0
query.weight.COMPARISON = 3.0
query.weight.TIME = 3.0
query.weight.ADVANTAGES = 2.5
query.weight.LIMITATIONS = 2.5
query.weight.USAGE = 2.5
query.weight.FUNCTION = 2.0
query.weight.COMPOSITION = 2.0
query.weight.HISTORY = 1.5
query.weight.DEFINITION = 1.5

# ── BM25 Ranking ──
bm25.k1 = 1.2
bm25.b = 0.75
bm25.top_k = 10

# ── HNSW Vector Index ──
hnsw.M = 16
hnsw.ef_construction = 200
hnsw.ef_search = 100

# ── Embedding ──
embedding.method = transformer        # bow | transformer | auto

# ── Hybrid Retrieval ──
retrieval.retriever = hybrid   # bm25 | hnsw | hybrid
retrieval.bm25_weight = 0.7
retrieval.ann_weight = 0.3
retrieval.max_ranked_docs = 10
retrieval.max_evidence = 15

# ── Chunk Selection ──
chunk.max_per_doc = 8
chunk.primary_type_boost = 10.0
chunk.secondary_type_boost = 6.0
chunk.fallback_type_boost = 1.0
chunk.keyword_boost = 3.0
chunk.min_chunk_size = 10

# ── Answer Scope ──
scope.strict_max_chars = 200
scope.normal_max_chars = 400
scope.expanded_max_chars = 700
scope.strict_max_segments = 2
scope.normal_max_segments = 4
scope.expanded_max_segments = 8

# ── Scope Adjustment ──
scope.high_confidence_threshold = 0.85
scope.low_confidence_threshold = 0.5

# ── Agreement-Based Compression ──
compression.min_confidence = 0.6
compression.min_agreement = 0.6
compression.strong_evidence_count = 4
compression.strong_evidence_confidence = 0.9
compression.normal_strong_confidence = 0.85
compression.normal_strong_agreement = 0.7
compression.expanded_light_confidence = 0.85
compression.expanded_light_agreement = 0.7

# ── Refined Confidence ──
confidence.coverage_weight = 0.3
confidence.volume_weight = 0.2
confidence.agreement_weight = 0.3
confidence.penalty_weight = 0.2
confidence.max_contradiction_penalty = 0.4
confidence.contradiction_penalty_per_pair = 0.15
confidence.volume_divisor = 3.0

# ── Synthesizer Scoring ──
synth.keyword_score = 3.0
synth.entity_score = 4.0
synth.entity_subject_boost = 6.0
synth.entity_is_pattern_boost = 8.0
synth.definition_pattern_boost = 5.0
synth.definition_first_pass_is_boost = 10.0
synth.definition_first_pass_pattern_boost = 3.0
synth.definition_first_pass_penalty = -4.0
synth.definition_first_pass_min_score = 5.0
synth.location_word_boost = 5.0
synth.location_noun_boost = 3.0
synth.location_capital_boost = 4.0
synth.location_non_loc_penalty = -5.0
synth.boost_word_score = 2.0
synth.heading_penalty = -2.0
synth.non_def_penalty = -3.0
synth.max_definition_text = 500
synth.max_location_text = 400
synth.max_history_text = 500
synth.max_advantages_text = 700
synth.max_limitations_text = 700
synth.max_usage_text = 700
synth.max_general_text = 600

# ── Entity Proximity Thresholds ──
proximity.definition_first_pass = 30
proximity.definition_fallback_subject = 30
proximity.location_chunk = 100
proximity.advantages_chunk = 50
proximity.advantages_fallback = 50
proximity.history_chunk = 200

# ── Validator ──
validator.signal_ratio_fail = 0.0
validator.signal_ratio_weak = 0.15
validator.fail_confidence_multiplier = 0.3
validator.weak_confidence_multiplier = 0.7
validator.support_coverage_threshold = 0.5
