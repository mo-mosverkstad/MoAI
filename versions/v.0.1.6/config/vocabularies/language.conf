# MoAI Language Resources
#
# Language-level word lists shared across the system.

# ── Stop Words ──
# Filtered out during keyword extraction and entity detection.

[STOP_WORDS]
a, an, the, is, are, was, were, be, been, being
have, has, had, do, does, did, will, would, shall
should, may, might, must, can, could
i, me, my, we, our, you, your, he, she, it
they, them, their, this, that, these, those
what, which, who, whom, how, when, where, why
not, no, nor, but, and, or, if, then, so
at, by, for, with, about, from, to, in, on
of, as, into, through, during, before, after
above, below, between, out, off, over, under
again, further, once, here, there, all, each
every, both, few, more, most, other, some, such
than, too, very, just, also
tell, explain, describe, define, show, please

# ── Non-Entity Words ──
# Words that describe properties but should not be extracted as entities.

[NON_ENTITY_WORDS]
important, famous, popular, useful, good, bad
better, worse, best, worst, great, large, small
scalable, reliable, fast, slow, cheap, expensive
suitable, mainstream, widely, still, connected
limitation, limitations, advantage, advantages
benefit, benefits, drawback, drawbacks
overview, difference, comparison, beginner, beginners
works, work, ensures, ensure, functions, operates
uses, provides, supports, requires, allows, enables
compared, related, based, called, known, used

# ── Neural Training Templates ──
# Format: prefix | suffix | intent | answer_type
# Entity is inserted between prefix and suffix to form a training query.

[TEMPLATES]
where is           |              | FACTUAL     | LOCATION
where is           | located      | FACTUAL     | LOCATION
what country is    | in           | FACTUAL     | LOCATION
what is            |              | FACTUAL     | DEFINITION
what is a          |              | FACTUAL     | DEFINITION
what are           |              | FACTUAL     | DEFINITION
define             |              | FACTUAL     | DEFINITION
who is             |              | FACTUAL     | PERSON_PROFILE
who was            |              | FACTUAL     | PERSON_PROFILE
who invented       |              | FACTUAL     | PERSON_PROFILE
who created        |              | FACTUAL     | PERSON_PROFILE
when was           | invented     | FACTUAL     | TEMPORAL
when was           | created      | FACTUAL     | TEMPORAL
